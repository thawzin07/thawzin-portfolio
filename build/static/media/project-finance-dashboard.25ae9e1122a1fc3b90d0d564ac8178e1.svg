<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Financial Trend Analysis Dashboard</title>
  <desc id="desc">A finance dashboard style thumbnail with stock trend charts and indicator cards.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#dbeafe" stop-opacity="0.92"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#020617" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect width="960" height="540" fill="url(#bg)"/>
  <circle cx="805" cy="92" r="170" fill="#38bdf8" opacity="0.14"/>
  <circle cx="110" cy="470" r="210" fill="#22c55e" opacity="0.11"/>

  <g filter="url(#shadow)">
    <rect x="92" y="72" width="776" height="396" rx="22" fill="url(#panel)"/>
    <rect x="92" y="72" width="776" height="54" rx="22" fill="#f8fafc"/>
    <circle cx="126" cy="99" r="7" fill="#ef4444"/>
    <circle cx="150" cy="99" r="7" fill="#f59e0b"/>
    <circle cx="174" cy="99" r="7" fill="#22c55e"/>
  </g>

  <g transform="translate(132 154)">
    <text x="0" y="0" fill="#0f172a" font-family="Arial, sans-serif" font-size="28" font-weight="700">Financial Trend Analysis</text>
    <text x="0" y="32" fill="#475569" font-family="Arial, sans-serif" font-size="16">Python Streamlit dashboard</text>

    <g transform="translate(0 72)">
      <rect width="152" height="84" rx="14" fill="#ecfeff"/>
      <text x="18" y="32" fill="#0f766e" font-family="Arial, sans-serif" font-size="14" font-weight="700">RSI</text>
      <text x="18" y="62" fill="#0f172a" font-family="Arial, sans-serif" font-size="28" font-weight="700">62.4</text>
    </g>
    <g transform="translate(176 72)">
      <rect width="152" height="84" rx="14" fill="#eff6ff"/>
      <text x="18" y="32" fill="#1d4ed8" font-family="Arial, sans-serif" font-size="14" font-weight="700">SMA</text>
      <text x="18" y="62" fill="#0f172a" font-family="Arial, sans-serif" font-size="28" font-weight="700">145.8</text>
    </g>
    <g transform="translate(352 72)">
      <rect width="152" height="84" rx="14" fill="#f0fdf4"/>
      <text x="18" y="32" fill="#15803d" font-family="Arial, sans-serif" font-size="14" font-weight="700">TREND</text>
      <text x="18" y="62" fill="#0f172a" font-family="Arial, sans-serif" font-size="28" font-weight="700">+8.2%</text>
    </g>
  </g>

  <g transform="translate(136 326)">
    <line x1="0" y1="92" x2="680" y2="92" stroke="#cbd5e1" stroke-width="2"/>
    <line x1="0" y1="0" x2="0" y2="92" stroke="#cbd5e1" stroke-width="2"/>
    <polyline points="0,74 58,66 114,72 172,48 226,55 284,34 342,44 402,22 462,28 522,15 586,24 650,8" fill="none" stroke="#2563eb" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <polyline points="0,86 58,78 114,82 172,70 226,62 284,58 342,50 402,43 462,34 522,31 586,25 650,18" fill="none" stroke="#22c55e" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
  </g>
</svg>
